name: Release

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write
  id-token: write        # required for npm provenance attestation
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        # actions/checkout@v4 — pinned to commit SHA to prevent supply chain attacks
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout prompts
        # PROMPTS_PAT is a fine-grained PAT with read access to postlane/prompts.
        # GITHUB_TOKEN is scoped to postlane/cli only and cannot access other repos.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: postlane/prompts
          token: ${{ secrets.PROMPTS_PAT }}
          path: prompts-checkout

      - name: Setup Node.js
        # actions/setup-node@v4 — pinned to commit SHA
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Release
        run: npx semantic-release
        env:
          # RELEASE_PAT is a fine-grained PAT from a repo admin (hugoelliott).
          # GITHUB_TOKEN cannot push back to protected branches; the PAT is in
          # the "Repository admin" bypass list on both main and beta rulesets.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PROMPTS_DIR: ${{ github.workspace }}/prompts-checkout
