name: Release

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

permissions:
  contents: write
  id-token: write        # required for npm provenance attestation
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        # actions/checkout@v4 — pinned to commit SHA to prevent supply chain attacks
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout prompts
        # PROMPTS_PAT is a fine-grained PAT with read access to postlane/prompts.
        # GITHUB_TOKEN is scoped to postlane/cli only and cannot access other repos.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: postlane/prompts
          token: ${{ secrets.PROMPTS_PAT }}
          path: prompts-checkout

      - name: Setup Node.js
        # actions/setup-node@v4 — pinned to commit SHA
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Release
        id: release
        run: npx semantic-release
        env:
          # RELEASE_PAT is a fine-grained PAT from a repo admin (hugoelliott).
          # GITHUB_TOKEN cannot push back to protected branches; the PAT is in
          # the "Repository admin" bypass list on both main and beta rulesets.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PROMPTS_DIR: ${{ github.workspace }}/prompts-checkout
          # npm reads this env var and passes --provenance to npm publish.
          # @semantic-release/npm v13 has no native provenance option; env var is the correct mechanism.
          # Requires id-token: write (set at workflow level) and a granular npm publish token.
          npm_config_provenance: 'true'

      - name: Post-publish smoke check
        # The semantic-release back-commit uses [skip ci] — the published artefact is never
        # tested by the main CI run. This step installs the just-published package from npm
        # and verifies it boots correctly, catching packaging or build-step regressions.
        # Only runs on a push to main or beta (not on chore: commits that produce no release).
        # Retries with 30-second delays: npm CDN propagation typically takes 30–120 seconds,
        # so a bare `sleep 10` races the cache and may install the previous version silently.
        if: github.ref_name == 'main' || github.ref_name == 'beta'
        run: |
          DIST_TAG="${{ github.ref_name == 'main' && 'latest' || 'beta' }}"
          for i in 1 2 3 4 5; do
            echo "Smoke check attempt $i/5..."
            if npx --yes @postlane/cli@"${DIST_TAG}" --version; then
              echo "Smoke check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed — waiting 30s for npm CDN propagation..."
            sleep 30
          done
          echo "ERROR: smoke check failed after 5 attempts (150s wait)"
          exit 1
